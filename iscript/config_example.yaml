work_dir: /tmp/work
artifact_dir: /tmp/artifacts
taskcluster_scope_prefix: "project:releng:signing:"
verbose: true
concurrency_limit: 2
default_keychains:
    - "/Users/cltbld/Library/Keychains/login.keychain-db"
    - "/Library/Keychains/System.keychain"
dmg_prefix: dep1
mac_config:
    dep:
        signing_keychain: /path/to/dep.keychain
        supported_behaviors:
            - mac_geckodriver
            - mac_sign
            - mac_sign_and_pkg
            - mac_single_file
        sign_with_entitlements: true
        verify_mac_signature: true
        identity: ...
        keychain_password: ...
        pkg_cert_id: ...
        concurrency_limit: 10
        widevine_url: ...
        widevine_user: ...
        widevine_pass: ...
        widevine_cert: ...
        langpack_url: ...
        langpack_user: ...
        langpack_pass: ..
